<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI | Secure Sync</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 40px; border-radius: 28px; background: #0f0f0f; border: 1px solid #1a1a1a; max-width: 400px; width: 90%; }
        .logo-container img { width: 100px; margin-bottom: 24px; }
        h1 { font-size: 22px; font-weight: 900; margin-bottom: 8px; color: #007bff; }
        p { color: #555; font-size: 13px; margin-bottom: 30px; }
        
        /* Google Button Center */
        #g_id_signin { margin-bottom: 25px; display: flex; justify-content: center; }

        .input-stack { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; opacity: 0.5; pointer-events: none; transition: 0.5s; }
        .active-stack { opacity: 1; pointer-events: auto; }

        select, input { background: #0a0a0a; color: #fff; border: 1px solid #222; padding: 16px; border-radius: 12px; font-size: 15px; outline: none; }
        .row { display: flex; gap: 10px; }
        select { width: 110px; }
        input { flex: 1; }

        button { width: 100%; padding: 18px; border-radius: 12px; border: none; background: #007bff; color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #222; cursor: not-allowed; }
        #userInfo { font-size: 12px; color: #007bff; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://image2url.com/r2/default/images/1775567043691-489f419b-f083-426c-8d98-4123875887bb.png" alt="Max AI">
    </div>
    <h1>IDENTITY SYNC</h1>
    <p>Step 1: Sign in with Google to verify your legal name.</p>
    
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div id="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>

    <div id="userInfo"></div>

    <div class="input-stack" id="phoneStack">
        <p style="margin-bottom: 10px; color: #888;">Step 2: Enter your phone number.</p>
        <div class="row">
            <select id="country"><option value="234">🇳🇬 +234</option><option value="1">🇺🇸 +1</option></select>
            <input type="tel" id="phone" placeholder="812 345 6789">
        </div>
        <button onclick="initiateSync()" id="mainBtn">SYNC TO MAX CORE</button>
    </div>
</div>

<script>
    let googleName = "";
    let googleEmail = "";

    // 1. Handle the Google Login Response
    function handleCredentialResponse(response) {
        // Decode the JWT token to get user info
        const responsePayload = parseJwt(response.credential);
        
        googleName = responsePayload.name;
        googleEmail = responsePayload.email;

        // Update UI
        document.getElementById('userInfo').innerText = `Verified as: ${googleName}`;
        document.getElementById('phoneStack').classList.add('active-stack');
        document.getElementById('g_id_signin').style.display = "none";
    }

    function parseJwt(token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    function initiateSync() {
        const country = document.getElementById('country').value;
        const local = document.getElementById('phone').value;
        const cleanLocal = local.replace(/\D/g, '').replace(/^0+/, '');
        
        const fullPhone = country + cleanLocal;
        const botNumber = "2348126928258"; 

        const urlParams = new URLSearchParams(window.location.search);
        const family = urlParams.get('family') || "UNKNOWN-HUB";

        // 2. Added Google Info to the message for Max
        const message = `VERIFY_REQUEST\nFamily: ${family}\nUser: ${fullPhone}\nName: ${googleName}\nEmail: ${googleEmail}`;
        const encodedMsg = encodeURIComponent(message);

        window.location.href = `https://wa.me/${botNumber}?text=${encodedMsg}`;
    }
</script>

</body>
</html>
