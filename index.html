<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max AI | Global Sync</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 40px; border-radius: 24px; background: #111; border: 1px solid #222; max-width: 400px; width: 90%; }
        .logo-container img { width: 100px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 800; margin-bottom: 5px; color: #007bff; }
        p { color: #666; font-size: 13px; margin-bottom: 30px; }

        /* Input Styling */
        .phone-input-container { display: flex; gap: 10px; margin-bottom: 25px; }
        
        select {
            background: #0a0a0a;
            color: #fff;
            border: 1px solid #222;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            width: 100px;
            outline: none;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #222;
            background: #0a0a0a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus, select:focus { border-color: #007bff; }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: #007bff;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #0056b3; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://image2url.com/r2/default/images/1775567043691-489f419b-f083-426c-8d98-4123875887bb.png" alt="Max AI">
    </div>
    <h1>IDENTITY SYNC</h1>
    <p>Select your country and enter your number to link with Max AI.</p>
    
    <div class="phone-input-container">
        <select id="countryCode">
            <option value="234">🇳🇬 +234</option>
            <option value="1">🇺🇸 +1</option>
            <option value="44">🇬🇧 +44</option>
            <option value="27">🇿🇦 +27</option>
            <option value="233">🇬🇭 +233</option>
            <option value="254">🇰🇪 +254</option>
            <option value="91">🇮🇳 +91</option>
            <option value="1">🇨🇦 +1</option>
        </select>
        
        <input type="tel" id="localPhone" placeholder="812 345 6789">
    </div>
    
    <button onclick="syncWithMax()" id="btn">SYNC TO BOT</button>
</div>

<script>
    function syncWithMax() {
        const country = document.getElementById('countryCode').value;
        const local = document.getElementById('localPhone').value;
        const btn = document.getElementById('btn');

        if (!local) {
            alert("Please enter your local number.");
            return;
        }

        // Clean the local number (remove first 0 if they typed it, and any spaces)
        let cleanLocal = local.replace(/\D/g, '');
        if (cleanLocal.startsWith('0')) {
            cleanLocal = cleanLocal.substring(1);
        }

        const fullUserPhone = country + cleanLocal;

        // THE CORRECT BOT NUMBER (2348126928258)
        const botNumber = "2348126928258"; 

        // Get Family ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const family = urlParams.get('family') || "JDION-CORE";

        const message = `VERIFY_REQUEST\nFamily: ${family}\nUser: ${fullUserPhone}`;
        const encodedMsg = encodeURIComponent(message);

        // Final Redirect URL
        const finalURL = `https://wa.me/${botNumber}?text=${encodedMsg}`;

        btn.innerText = "OPENING WHATSAPP...";
        btn.style.background = "#222";

        setTimeout(() => {
            window.location.href = finalURL;
        }, 600);
    }
</script>

</body>
</html>
